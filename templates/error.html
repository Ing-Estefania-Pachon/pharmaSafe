{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-12 text-center my-5">
        <div class="card border-0 shadow-sm rounded-4 p-5">
            <div class="text-danger mb-4">
                <i class="fa-solid fa-triangle-exclamation" style="font-size: 5rem;"></i>
            </div>
            <h3 class="fw-bold text-dark mb-2">¡Algo salió mal!</h3>
            <p class="text-muted small mb-4">
                {{ mensaje }}
            </p>
            <div>
                <a href="{{ url_for('dashboard') }}" class="btn btn-indigo rounded-pill px-4">
                    <i class="fa-solid fa-house-medical me-2"></i>Volver al Dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
